name: Build & Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Package standalone
        run: |
          mkdir -p package/.next
          cp -r .next/standalone/* package/
          cp -r .next/static package/.next/static
          mkdir -p package/public
          cp -r public/* package/public/ 2>/dev/null || true
          cd package && tar -czf ../letter-builder-standalone.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: letter-builder-standalone
          path: letter-builder-standalone.tar.gz

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build
      - name: Create launcher
        shell: bash
        run: |
          cat > launcher.js << 'EOF'
          const path = require('path');
          const { exec } = require('child_process');
          process.env.PORT = '3847';
          process.env.HOSTNAME = '127.0.0.1';
          process.env.NODE_ENV = 'production';
          console.log('Letter Builder starting on http://127.0.0.1:3847');
          setTimeout(() => { exec('start http://127.0.0.1:3847'); }, 2500);
          require(path.join(__dirname, 'server.js'));
          EOF
      - name: Build exe
        run: |
          npm install -g pkg
          xcopy /E /I /Y .next\standalone\* . >nul 2>&1
          xcopy /E /I /Y .next\static .next\static >nul 2>&1
          if not exist public mkdir public
          xcopy /E /I /Y public public >nul 2>&1
          pkg launcher.js --targets node18-win-x64 --output letter-builder.exe --compress GZip
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: letter-builder-windows-exe
          path: letter-builder.exe
