name: Build & Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Obfuscate server code
        run: node obfuscate.js
      - name: Package standalone
        run: |
          mkdir -p package/.next
          cp -r .next/standalone/* package/
          cp -r .next/static package/.next/static
          mkdir -p package/public
          cp -r public/* package/public/ 2>/dev/null || true
          cd package && tar -czf ../letter-builder-standalone.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: letter-builder-standalone
          path: letter-builder-standalone.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      - name: Obfuscate server code
        shell: bash
        run: node obfuscate.js

      - name: Create Windows package
        shell: bash
        run: |
          # Create package directory
          mkdir -p LetterBuilder/app/.next

          # Copy standalone server
          cp -r .next/standalone/* LetterBuilder/app/
          cp -r .next/static LetterBuilder/app/.next/static
          mkdir -p LetterBuilder/app/public
          cp -r public/* LetterBuilder/app/public/ 2>/dev/null || true

          # Download Node.js portable for Windows
          curl -L -o node.zip "https://nodejs.org/dist/v20.18.1/node-v20.18.1-win-x64.zip"
          unzip -q node.zip
          mv node-v20.18.1-win-x64 LetterBuilder/node

          # Create launcher bat
          cat > LetterBuilder/LetterBuilder.bat << 'BAT'
          @echo off
          title Letter Builder by Brain Lead
          echo.
          echo   Letter Builder by Brain Lead
          echo   Starting server...
          echo.
          set PORT=3847
          set HOSTNAME=127.0.0.1
          set NODE_ENV=production
          start "" "http://127.0.0.1:3847"
          "%~dp0node\node.exe" "%~dp0app\server.js"
          BAT

          # Create README
          cat > LetterBuilder/README.txt << 'README'
          Letter Builder by Brain Lead
          ============================

          Double-click LetterBuilder.bat to start.
          Opens in your browser at http://127.0.0.1:3847

          Do not close the command window while using.
          README

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path LetterBuilder -DestinationPath LetterBuilder-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: LetterBuilder-Windows
          path: LetterBuilder-Windows.zip
