name: Build & Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Package standalone
        run: |
          mkdir -p package/.next
          cp -r .next/standalone/* package/
          cp -r .next/static package/.next/static
          mkdir -p package/public
          cp -r public/* package/public/ 2>/dev/null || true
          cd package && tar -czf ../letter-builder-standalone.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: letter-builder-standalone
          path: letter-builder-standalone.tar.gz

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      - name: Prepare and build exe
        shell: bash
        run: |
          # Create staging directory
          mkdir -p staging/.next

          # Copy standalone server files
          cp -r .next/standalone/* staging/

          # Copy static assets
          cp -r .next/static staging/.next/static

          # Copy public
          mkdir -p staging/public
          cp -r public/* staging/public/ 2>/dev/null || true

          # Create launcher
          cat > staging/launcher.js << 'LAUNCHER'
          const path = require('path');
          const { exec } = require('child_process');
          process.env.PORT = '3847';
          process.env.HOSTNAME = '127.0.0.1';
          process.env.NODE_ENV = 'production';
          console.log('');
          console.log('  Letter Builder by Brain Lead');
          console.log('  http://127.0.0.1:3847');
          console.log('');
          console.log('  Do not close this window while using Letter Builder.');
          console.log('');
          setTimeout(() => {
            try { exec('start http://127.0.0.1:3847'); } catch(e) {}
          }, 3000);
          require(path.join(__dirname, 'server.js'));
          LAUNCHER

          # Install pkg
          npm install -g @yao-pkg/pkg

          # Build exe from staging directory
          cd staging
          pkg launcher.js --targets node20-win-x64 --output ../letter-builder.exe --compress GZip

          # Verify
          cd ..
          ls -la letter-builder.exe

      - uses: actions/upload-artifact@v4
        with:
          name: letter-builder-windows-exe
          path: letter-builder.exe
