name: Build & Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Obfuscate server code
        run: node obfuscate.js
      - name: Package standalone
        run: |
          mkdir -p package/.next
          cp -r .next/standalone/* package/
          cp -r .next/static package/.next/static
          mkdir -p package/public
          cp -r public/* package/public/ 2>/dev/null || true
          cd package && tar -czf ../letter-builder-standalone.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: letter-builder-standalone
          path: letter-builder-standalone.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      - name: Obfuscate server code
        shell: bash
        run: node obfuscate.js

      - name: Create Windows package
        shell: bash
        run: |
          mkdir -p LetterBuilder/app/.next
          cp -r .next/standalone/* LetterBuilder/app/
          cp -r .next/static LetterBuilder/app/.next/static
          mkdir -p LetterBuilder/app/public
          cp -r public/* LetterBuilder/app/public/ 2>/dev/null || true

          # Download Node.js portable
          curl -L -o node.zip "https://nodejs.org/dist/v20.18.1/node-v20.18.1-win-x64.zip"
          unzip -q node.zip
          mv node-v20.18.1-win-x64 LetterBuilder/node

      - name: Create exe launcher
        shell: pwsh
        run: |
          $code = @'
          using System;
          using System.Diagnostics;
          using System.IO;
          using System.Threading;

          class Program {
              static void Main() {
                  string baseDir = AppDomain.CurrentDomain.BaseDirectory;
                  string nodeExe = Path.Combine(baseDir, "node", "node.exe");
                  string serverJs = Path.Combine(baseDir, "app", "server.js");

                  if (!File.Exists(nodeExe)) {
                      Console.WriteLine("ERROR: node/node.exe not found. Make sure the node folder is next to LetterBuilder.exe");
                      Console.ReadKey();
                      return;
                  }
                  if (!File.Exists(serverJs)) {
                      Console.WriteLine("ERROR: app/server.js not found. Make sure the app folder is next to LetterBuilder.exe");
                      Console.ReadKey();
                      return;
                  }

                  Console.Title = "Letter Builder by Brain Lead";
                  Console.WriteLine("");
                  Console.WriteLine("  ╔══════════════════════════════════════╗");
                  Console.WriteLine("  ║     Letter Builder by Brain Lead     ║");
                  Console.WriteLine("  ║     http://127.0.0.1:3847           ║");
                  Console.WriteLine("  ╚══════════════════════════════════════╝");
                  Console.WriteLine("");
                  Console.WriteLine("  Starting server...");
                  Console.WriteLine("  Do NOT close this window.");
                  Console.WriteLine("");

                  var psi = new ProcessStartInfo {
                      FileName = nodeExe,
                      Arguments = "\"" + serverJs + "\"",
                      WorkingDirectory = Path.Combine(baseDir, "app"),
                      UseShellExecute = false,
                      RedirectStandardOutput = true,
                      RedirectStandardError = true,
                      CreateNoWindow = false
                  };
                  psi.EnvironmentVariables["PORT"] = "3847";
                  psi.EnvironmentVariables["HOSTNAME"] = "127.0.0.1";
                  psi.EnvironmentVariables["NODE_ENV"] = "production";

                  var proc = Process.Start(psi);

                  // Open browser after 3 seconds
                  new Thread(() => {
                      Thread.Sleep(3000);
                      try { Process.Start(new ProcessStartInfo("http://127.0.0.1:3847") { UseShellExecute = true }); } catch {}
                      Console.WriteLine("  Browser opened. Ready!");
                  }).Start();

                  // Pipe output
                  new Thread(() => { string line; while ((line = proc.StandardOutput.ReadLine()) != null) Console.WriteLine("  " + line); }).Start();
                  new Thread(() => { string line; while ((line = proc.StandardError.ReadLine()) != null) Console.WriteLine("  " + line); }).Start();

                  proc.WaitForExit();
              }
          }
          '@

          $code | Out-File -Encoding utf8 LetterBuilder\Launcher.cs
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:exe /out:LetterBuilder\LetterBuilder.exe LetterBuilder\Launcher.cs
          Remove-Item LetterBuilder\Launcher.cs

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path LetterBuilder -DestinationPath LetterBuilder-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: LetterBuilder-Windows
          path: LetterBuilder-Windows.zip
